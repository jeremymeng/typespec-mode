name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (Emacs ${{ matrix.emacs_version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        emacs_version: ['29.1', '30.1']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emacs (Unix)
        if: runner.os != 'Windows'
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Setup Emacs (Windows)
        if: runner.os == 'Windows'
        uses: jcs090218/setup-emacs-windows@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Verify Emacs
        shell: bash
        run: emacs --version

      - name: Install Eldev
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/emacs-eldev/eldev/master/webinstall/eldev > eldev-install
          sh eldev-install
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Byte-compile (no warnings)
        shell: bash
        run: eldev -p -dtT compile --warnings-as-errors

      - name: Lint (package-lint + checkdoc)
        shell: bash
        # Lint failures are advisory on PRs but should be looked at; do not
        # block the matrix on them yet.
        continue-on-error: true
        run: eldev -p -dtT lint

      - name: Run tests (Unix, packaged mode)
        if: runner.os != 'Windows'
        shell: bash
        run: eldev -p -dtT test

      - name: Run tests (Windows, source mode)
        # Eldev's packaged mode (`-p`) spawns a child Emacs process with a
        # very long bootstrap command line, which Emacs on Windows cannot
        # handle (`file-error "Spawning child process" "Invalid argument"`
        # due to the OS argv length limit).  Run tests in source mode on
        # Windows so the matrix still covers Windows; Unix runners keep
        # packaged-mode tests as the canonical install-simulation gate.
        if: runner.os == 'Windows'
        shell: bash
        run: eldev -dtT test
